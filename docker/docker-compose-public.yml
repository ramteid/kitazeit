services:
  app:
    environment:
      - KITAZEIT_PUBLIC_URL=https://${KITAZEIT_DOMAIN:?KITAZEIT_DOMAIN must be set in .env}
      - KITAZEIT_ALLOWED_ORIGINS=https://${KITAZEIT_DOMAIN:?KITAZEIT_DOMAIN must be set in .env}
      - KITAZEIT_SECURE_COOKIES=true
      - KITAZEIT_ENFORCE_CSRF=true
      - KITAZEIT_ENFORCE_ORIGIN=true

  caddy:
    image: caddy:2-alpine
    container_name: kitazeit-caddy
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - KITAZEIT_DOMAIN=${KITAZEIT_DOMAIN:?KITAZEIT_DOMAIN must be set in .env}
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - public

volumes:
  caddy_data:
    name: kitazeit_caddy_data
  caddy_config:
    name: kitazeit_caddy_config
